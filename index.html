<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solitaire Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div>
    🏆 Pontos: <span id="score">0</span> |
    ⏱ <span id="timer">00:00</span>
  </div>
  <div>
    <button id="drawModeBtn">Modo: 1</button>
    <button onclick="newGame()">Novo Jogo</button>
  </div>
</header>

<div id="game"></div>

<div id="victory" class="hidden">
  <h1>🏆 Você venceu!</h1>
  <button onclick="newGame()">Jogar novamente</button>
</div>

<script src="game.js" defer></script>
</body>
</html>
